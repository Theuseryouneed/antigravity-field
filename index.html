<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// CAMERA
async function setupCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;

  return new Promise(resolve => {
    video.onloadedmetadata = () => {
      video.play();
      resolve(video);
    };
  });
}

// PARTICLES
let particles = [];

class Particle {
  constructor(x,y){
    this.x=x;
    this.y=y;
    this.vx=(Math.random()-0.5)*2;
    this.vy=(Math.random()-0.5)*2;
    this.life=1;
  }
  update(){
    this.x+=this.vx;
    this.y+=this.vy;
    this.life-=0.015;
  }
  draw(){
    ctx.globalAlpha=this.life;
    ctx.fillStyle="#00ffcc";
    ctx.beginPath();
    ctx.arc(this.x,this.y,2,0,Math.PI*2);
    ctx.fill();
  }
}

// DISTANCE
function dist(a,b){
  return Math.hypot(a.x-b.x, a.y-b.y);
}

async function run() {
  await setupCamera();
  const model = await handpose.load();

  async function detect(){
    const predictions = await model.estimateHands(video);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.translate(canvas.width,0);
    ctx.scale(-1,1);

    predictions.forEach(hand=>{
      const lm = hand.landmarks;

      // 👉 PALM CENTER (REAL FEEL)
      const palm = {
        x: (lm[0][0] + lm[5][0] + lm[17][0]) / 3,
        y: (lm[0][1] + lm[5][1] + lm[17][1]) / 3
      };

      // 👉 PINCH DETECTION
      const thumb = {x: lm[4][0], y: lm[4][1]};
      const index = {x: lm[8][0], y: lm[8][1]};
      const pinchDist = dist(thumb, index);

      const pinch = pinchDist < 40;

      // 👉 ORB SIZE BASED ON PINCH
      let radius = pinch ? 20 : 60;

      // 👉 GLOW ORB
      const gradient = ctx.createRadialGradient(
        palm.x, palm.y, 0,
        palm.x, palm.y, radius
      );
      gradient.addColorStop(0, "rgba(0,255,200,0.9)");
      gradient.addColorStop(1, "rgba(0,255,200,0)");

      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(palm.x, palm.y, radius, 0, Math.PI*2);
      ctx.fill();

      // 👉 PARTICLE EMISSION
      for(let i=0;i<3;i++){
        particles.push(new Particle(palm.x, palm.y));
      }

      // 👉 ENERGY LINES BETWEEN FINGERS
      const tips = [4,8,12,16,20];
      for(let i=0;i<tips.length;i++){
        for(let j=i+1;j<tips.length;j++){
          const p1 = lm[tips[i]];
          const p2 = lm[tips[j]];

          const d = Math.hypot(p1[0]-p2[0], p1[1]-p2[1]);

          if(d<120){
            ctx.strokeStyle=`rgba(0,255,200,${1-d/120})`;
            ctx.beginPath();
            ctx.moveTo(p1[0], p1[1]);
            ctx.lineTo(p2[0], p2[1]);
            ctx.stroke();
          }
        }
      }

      // 👉 PINCH VISUAL
      if(pinch){
        ctx.strokeStyle="#00ffcc";
        ctx.lineWidth=2;
        ctx.beginPath();
        ctx.arc(palm.x, palm.y, radius+10, 0, Math.PI*2);
        ctx.stroke();
      }

    });

    // PARTICLES
    particles = particles.filter(p=>p.life>0);
    particles.forEach(p=>{
      p.update();
      p.draw();
    });

    ctx.restore();
    requestAnimationFrame(detect);
  }

  detect();
}

run();
</script>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hand Power GOD MODE ⚡</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* 🎬 CINEMATIC CAMERA */
video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;

  filter: brightness(0.7) contrast(1.3) saturate(1.2) hue-rotate(-10deg);
}

canvas {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// resize
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// Mediapipe setup
const hands = new Hands({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

// particles
let particles = [];
let angle = 0;

function createParticles(x, y) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x,
      y,
      vx: (Math.random() - 0.5) * 3,
      vy: (Math.random() - 0.5) * 3,
      life: 40
    });
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.fillStyle = "rgba(0,255,255," + p.life/40 + ")";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
    ctx.fill();

    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  });

  particles = particles.filter(p => p.life > 0);
}

// MAIN LOOP
hands.onResults((results) => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const handsData = [];

  if (results.multiHandLandmarks) {
    results.multiHandLandmarks.forEach(lm => {
      const x = lm[9].x * canvas.width;
      const y = lm[9].y * canvas.height;

      handsData.push({x, y});

      // 🔥 BIG GLOW AURA
      const grad = ctx.createRadialGradient(x, y, 20, x, y, 140);
      grad.addColorStop(0, "rgba(0,255,255,0.9)");
      grad.addColorStop(1, "transparent");

      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, 140, 0, Math.PI*2);
      ctx.fill();

      createParticles(x, y);
    });
  }

  drawParticles();

  // 🌍 TWO HAND GLOBE
  if (handsData.length === 2) {
    const h1 = handsData[0];
    const h2 = handsData[1];

    const midX = (h1.x + h2.x) / 2;
    const midY = (h1.y + h2.y) / 2;

    const dist = Math.hypot(h1.x - h2.x, h1.y - h2.y);
    const radius = dist / 2;

    // ⚡ ENERGY BEAM
    ctx.strokeStyle = "rgba(0,255,255,0.9)";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(h1.x, h1.y);
    ctx.lineTo(h2.x, h2.y);
    ctx.stroke();

    // 🌍 CORE ENERGY
    const glow = ctx.createRadialGradient(midX, midY, 20, midX, midY, radius);
    glow.addColorStop(0, "rgba(0,255,255,0.9)");
    glow.addColorStop(1, "rgba(0,0,0,0)");

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(midX, midY, radius, 0, Math.PI*2);
    ctx.fill();

    // 🌀 ROTATING PARTICLE SHELL
    angle += 0.03;

    for (let i = 0; i < 60; i++) {
      const a = (i / 60) * Math.PI * 2 + angle;

      const x = midX + Math.cos(a) * radius;
      const y = midY + Math.sin(a) * radius;

      ctx.fillStyle = "rgba(0,255,255,0.9)";
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI*2);
      ctx.fill();
    }

    // 🌐 OUTER RING
    ctx.strokeStyle = "rgba(0,255,255,0.8)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(midX, midY, radius, 0, Math.PI*2);
    ctx.stroke();
  }
});

// camera
const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
  },
  width: 1280,
  height: 720
});

camera.start();
</script>

</body>
</html>

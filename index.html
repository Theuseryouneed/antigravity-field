<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Gesture OS</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* Camera */
video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
  filter: brightness(0.85) contrast(1.1);
}

/* Canvas */
canvas {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

/* UI */
button {
  position: absolute;
  z-index: 10;
  padding: 10px 16px;
  border-radius: 8px;
  border: none;
  background: rgba(0,0,0,0.6);
  color: white;
}

#startBtn { top: 20px; left: 20px; }
#switchBtn { top: 20px; right: 20px; }
</style>
</head>

<body>

<button id="startBtn">Start</button>
<button id="switchBtn">Switch Camera</button>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let camera;
let usingFront = true;

/* Resize */
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

/* Gesture State */
let handsData = [];
let globeActive = false;
let globeSize = 80;

/* MediaPipe */
const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(results => {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (!results.multiHandLandmarks) return;

  handsData = results.multiHandLandmarks;

  drawHands(results.multiHandLandmarks);
  handleGestures(results.multiHandLandmarks);
});

/* Draw Hand Skeleton */
function drawHands(hands) {
  hands.forEach(hand => {
    hand.forEach(pt => {
      ctx.beginPath();
      ctx.arc(pt.x * canvas.width, pt.y * canvas.height, 4, 0, Math.PI*2);
      ctx.fillStyle = "#00f7ff";
      ctx.fill();
    });
  });
}

/* Gesture Logic */
function handleGestures(hands) {

  if (hands.length === 2) {
    let h1 = hands[0][9];
    let h2 = hands[1][9];

    let x1 = h1.x * canvas.width;
    let y1 = h1.y * canvas.height;
    let x2 = h2.x * canvas.width;
    let y2 = h2.y * canvas.height;

    let midX = (x1 + x2) / 2;
    let midY = (y1 + y2) / 2;

    let dist = Math.hypot(x1-x2, y1-y2);

    globeActive = true;
    globeSize = dist;

    drawGlobe(midX, midY, globeSize);
  } else {
    globeActive = false;

    let hand = hands[0];
    let pt = hand[9];

    let x = pt.x * canvas.width;
    let y = pt.y * canvas.height;

    drawEnergy(x,y);
  }
}

/* Globe */
function drawGlobe(x,y,size) {
  for (let i=0;i<60;i++) {
    let angle = i * 0.1 + Date.now()*0.002;

    let px = x + Math.cos(angle) * size * 0.5;
    let py = y + Math.sin(angle) * size * 0.5;

    ctx.beginPath();
    ctx.arc(px, py, 2, 0, Math.PI*2);
    ctx.fillStyle = "#00ffcc";
    ctx.fill();
  }

  ctx.beginPath();
  ctx.arc(x,y,size*0.5,0,Math.PI*2);
  ctx.strokeStyle = "rgba(0,255,200,0.4)";
  ctx.stroke();
}

/* Energy */
function drawEnergy(x,y) {
  for (let i=0;i<20;i++) {
    let px = x + (Math.random()-0.5)*40;
    let py = y + (Math.random()-0.5)*40;

    ctx.beginPath();
    ctx.arc(px, py, 2, 0, Math.PI*2);
    ctx.fillStyle = "#00f7ff";
    ctx.fill();
  }
}

/* Camera */
async function startCamera() {
  if (camera) camera.stop();

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: usingFront ? "user" : "environment" }
  });

  video.srcObject = stream;

  camera = new Camera(video, {
    onFrame: async () => {
      await hands.send({image: video});
    },
    width: 640,
    height: 480
  });

  camera.start();
}

/* Buttons */
document.getElementById("startBtn").onclick = startCamera;

document.getElementById("switchBtn").onclick = () => {
  usingFront = !usingFront;
  startCamera();
};
</script>

</body>
</html>

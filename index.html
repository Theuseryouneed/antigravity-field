<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marvel Gesture System ⚡</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.75) contrast(1.2);
}

canvas {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

/* UI BUTTONS */
#startBtn, #switchBtn {
  position: absolute;
  z-index: 10;
  padding: 12px 18px;
  border: none;
  border-radius: 8px;
  background: rgba(0,0,0,0.6);
  color: white;
  font-size: 16px;
}

#startBtn {
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

#switchBtn {
  top: 20px;
  right: 20px;
}
</style>
</head>

<body>

<button id="startBtn">Start Experience 🚀</button>
<button id="switchBtn">Switch Camera 🔄</button>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let facingMode = "user"; // front camera default

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// MEDIAPIPE
const hands = new Hands({
  locateFile: file =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 0,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

// STATE
let angle = 0;
let portalActive = false;

// DISTANCE
function dist(a,b){
  return Math.hypot(a.x-b.x, a.y-b.y);
}

// MAIN
hands.onResults((results)=>{
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let handsData = [];

  if(results.multiHandLandmarks){
    results.multiHandLandmarks.forEach(lm=>{
      const palm = {
        x: lm[9].x * canvas.width,
        y: lm[9].y * canvas.height
      };
      handsData.push(palm);

      // hand glow
      const g = ctx.createRadialGradient(palm.x,palm.y,10,palm.x,palm.y,100);
      g.addColorStop(0,"rgba(0,255,255,0.8)");
      g.addColorStop(1,"transparent");

      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(palm.x,palm.y,100,0,Math.PI*2);
      ctx.fill();
    });
  }

  // 🧙‍♂️ PORTAL
  if(handsData.length === 2){
    const p1 = handsData[0];
    const p2 = handsData[1];

    const midX = (p1.x + p2.x)/2;
    const midY = (p1.y + p2.y)/2;
    const radius = dist(p1,p2)/2;

    portalActive = true;

    angle += 0.05;

    // 🔥 OUTER RING
    ctx.strokeStyle = "orange";
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.arc(midX,midY,radius,0,Math.PI*2);
    ctx.stroke();

    // ✨ SPARKS
    for(let i=0;i<100;i++){
      const a = Math.random()*Math.PI*2 + angle;
      const r = radius * (0.8 + Math.random()*0.2);

      const x = midX + Math.cos(a)*r;
      const y = midY + Math.sin(a)*r;

      ctx.fillStyle = "orange";
      ctx.beginPath();
      ctx.arc(x,y,2,0,Math.PI*2);
      ctx.fill();
    }

    // 🌀 INNER ROTATION
    for(let i=0;i<40;i++){
      const a = (i/40)*Math.PI*2 - angle;

      const x = midX + Math.cos(a)*radius*0.6;
      const y = midY + Math.sin(a)*radius*0.6;

      ctx.fillStyle = "rgba(255,150,0,0.8)";
      ctx.beginPath();
      ctx.arc(x,y,2,0,Math.PI*2);
      ctx.fill();
    }
  } else {
    portalActive = false;
  }
});

// CAMERA START
let camera;

async function startCamera(){
  document.getElementById("startBtn").style.display = "none";

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: facingMode }
  });

  video.srcObject = stream;

  camera = new Camera(video,{
    onFrame: async()=>{
      await hands.send({image: video});
    }
  });

  camera.start();
}

// SWITCH CAMERA
document.getElementById("switchBtn").onclick = async ()=>{
  facingMode = (facingMode === "user") ? "environment" : "user";
  startCamera();
};

// START BUTTON
document.getElementById("startBtn").onclick = startCamera;

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANTIGRAVITY FIELD FINAL</title>

<style>
body { margin:0; overflow:hidden; background:black; }
video, canvas {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}
video {
  transform: scaleX(-1);
  opacity:0.25;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<!-- ✅ OFFICIAL MEDIAPIPE BUNDLE -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ===== PARTICLES =====
let particles = [];

class Particle {
  constructor(x,y){
    this.x=x;
    this.y=y;
    this.vx=(Math.random()-0.5)*3;
    this.vy=(Math.random()-0.5)*3;
    this.life=1;
  }
  update(){
    this.x+=this.vx;
    this.y+=this.vy;
    this.life-=0.02;
  }
  draw(){
    ctx.globalAlpha=this.life;
    ctx.fillStyle="#00ffcc";
    ctx.beginPath();
    ctx.arc(this.x,this.y,2,0,Math.PI*2);
    ctx.fill();
  }
}

// ===== HANDS =====
const hands = new Hands({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

let resultsData = [];

hands.onResults(results => {
  resultsData = results.multiHandLandmarks || [];
});

// ===== CAMERA =====
const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
  },
  width: 1280,
  height: 720
});
camera.start();

// ===== DRAW LOOP =====
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(canvas.width,0);
  ctx.scale(-1,1);

  let allPoints = [];

  resultsData.forEach(hand=>{
    hand.forEach(point=>{
      const x = point.x * canvas.width;
      const y = point.y * canvas.height;

      allPoints.push({x,y});

      // glow
      ctx.fillStyle="#00ffcc";
      ctx.shadowBlur=15;
      ctx.shadowColor="#00ffcc";
      ctx.beginPath();
      ctx.arc(x,y,4,0,Math.PI*2);
      ctx.fill();

      // particles
      if(Math.random()<0.25){
        particles.push(new Particle(x,y));
      }
    });
  });

  // ===== CONNECTION FIELD =====
  if(resultsData.length===2){
    const h1 = resultsData[0];
    const h2 = resultsData[1];

    h1.forEach(p1=>{
      h2.forEach(p2=>{
        const x1 = p1.x * canvas.width;
        const y1 = p1.y * canvas.height;
        const x2 = p2.x * canvas.width;
        const y2 = p2.y * canvas.height;

        const d = Math.hypot(x1-x2,y1-y2);

        if(d<250){
          ctx.strokeStyle=`rgba(0,255,200,${1-d/250})`;
          ctx.beginPath();
          ctx.moveTo(x1,y1);
          ctx.lineTo(x2,y2);
          ctx.stroke();
        }
      });
    });
  }

  // ===== PARTICLES =====
  particles = particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.update();
    p.draw();
  });

  ctx.restore();
  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>

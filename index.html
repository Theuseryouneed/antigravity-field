<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gesture Engine V5 ⚡</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.7) contrast(1.3) saturate(1.2) hue-rotate(-10deg);
}

canvas {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// Mediapipe
const hands = new Hands({
  locateFile: file =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

// STATE
let particles = [];
let burstParticles = [];
let angle = 0;
let charge = 0;
let lastPinch = false;

function dist(a,b){
  return Math.hypot(a.x-b.x, a.y-b.y);
}

// PARTICLES
function spawnParticles(x,y,amount=5){
  for(let i=0;i<amount;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*2,
      vy:(Math.random()-0.5)*2,
      life:40
    });
  }
}

function spawnBurst(x,y){
  for(let i=0;i<60;i++){
    burstParticles.push({
      x,y,
      vx:(Math.random()-0.5)*8,
      vy:(Math.random()-0.5)*8,
      life:50
    });
  }
}

function drawParticles(){
  [...particles, ...burstParticles].forEach(p=>{
    ctx.fillStyle = `rgba(0,255,255,${p.life/50})`;
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fill();

    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  });

  particles = particles.filter(p=>p.life>0);
  burstParticles = burstParticles.filter(p=>p.life>0);
}

// MAIN
hands.onResults((results)=>{
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let handsData = [];

  if(results.multiHandLandmarks){
    results.multiHandLandmarks.forEach(lm=>{

      const palm = {
        x: lm[9].x * canvas.width,
        y: lm[9].y * canvas.height
      };

      const thumb = {
        x: lm[4].x * canvas.width,
        y: lm[4].y * canvas.height
      };

      const index = {
        x: lm[8].x * canvas.width,
        y: lm[8].y * canvas.height
      };

      const pinch = dist(thumb,index) < 40;

      handsData.push({palm, pinch});

      // 🔥 PINCH CHARGE EFFECT
      if(pinch){
        charge += 0.05;
        charge = Math.min(charge, 2);
      } else {
        if(lastPinch){
          spawnBurst(palm.x, palm.y); // ⚡ release explosion
        }
        charge *= 0.9;
      }

      lastPinch = pinch;

      // ✨ HAND AURA
      const grad = ctx.createRadialGradient(
        palm.x,palm.y,10,
        palm.x,palm.y,120 + charge*60
      );
      grad.addColorStop(0,"rgba(0,255,255,0.9)");
      grad.addColorStop(1,"transparent");

      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(palm.x,palm.y,120 + charge*60,0,Math.PI*2);
      ctx.fill();

      spawnParticles(palm.x,palm.y,5 + charge*5);
    });
  }

  drawParticles();

  // 🌍 TWO HAND GLOBE
  if(handsData.length === 2){
    const p1 = handsData[0].palm;
    const p2 = handsData[1].palm;

    const midX = (p1.x + p2.x)/2;
    const midY = (p1.y + p2.y)/2;
    const radius = dist(p1,p2)/2;

    // ⚡ ENERGY BEAM
    ctx.strokeStyle = "rgba(0,255,255,0.8)";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(p1.x,p1.y);
    ctx.lineTo(p2.x,p2.y);
    ctx.stroke();

    // 🌍 CORE
    const glow = ctx.createRadialGradient(midX,midY,20,midX,midY,radius);
    glow.addColorStop(0,"rgba(0,255,255,0.8)");
    glow.addColorStop(1,"transparent");

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(midX,midY,radius,0,Math.PI*2);
    ctx.fill();

    // 🌀 ROTATING FIELD
    angle += 0.03;

    for(let i=0;i<80;i++){
      const a = (i/80)*Math.PI*2 + angle;

      const x = midX + Math.cos(a)*radius;
      const y = midY + Math.sin(a)*radius;

      ctx.fillStyle = "rgba(0,255,255,0.9)";
      ctx.beginPath();
      ctx.arc(x,y,2,0,Math.PI*2);
      ctx.fill();
    }
  }
});

// CAMERA
const camera = new Camera(video,{
  onFrame: async()=>{
    await hands.send({image: video});
  },
  width:1280,
  height:720
});

camera.start();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Antigravity Field - Stable</title>

<style>
body { margin:0; overflow:hidden; background:black; }

video {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scaleX(-1);
}

canvas {
  position:absolute;
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<!-- ✅ MEDIAPIPE (STABLE) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// PARTICLES
let particles = [];

class Particle {
  constructor(x,y){
    this.x=x; this.y=y;
    this.vx=(Math.random()-0.5)*2;
    this.vy=(Math.random()-0.5)*2;
    this.life=1;
  }
  update(){
    this.x+=this.vx;
    this.y+=this.vy;
    this.life-=0.02;
  }
  draw(){
    ctx.globalAlpha=this.life;
    ctx.fillStyle="#00ffcc";
    ctx.beginPath();
    ctx.arc(this.x,this.y,2,0,Math.PI*2);
    ctx.fill();
  }
}

// HANDS
const hands = new Hands({
  locateFile: file =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

let palms = [];

hands.onResults(results => {

  ctx.clearRect(0,0,canvas.width,canvas.height);

  palms = [];

  if(results.multiHandLandmarks){

    results.multiHandLandmarks.forEach(lm => {

      const palm = {
        x: (lm[0].x + lm[5].x + lm[17].x)/3 * canvas.width,
        y: (lm[0].y + lm[5].y + lm[17].y)/3 * canvas.height
      };

      palms.push(palm);

      // ORB
      const radius = 60;

      const grad = ctx.createRadialGradient(
        palm.x,palm.y,0,
        palm.x,palm.y,radius
      );

      grad.addColorStop(0,"rgba(0,255,200,0.9)");
      grad.addColorStop(1,"rgba(0,255,200,0)");

      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(palm.x,palm.y,radius,0,Math.PI*2);
      ctx.fill();

      particles.push(new Particle(palm.x,palm.y));
    });
  }

  // TWO HAND GLOBE
  if(palms.length === 2){

    const cx = (palms[0].x + palms[1].x)/2;
    const cy = (palms[0].y + palms[1].y)/2;

    const dx = palms[0].x - palms[1].x;
    const dy = palms[0].y - palms[1].y;

    const radius = Math.sqrt(dx*dx + dy*dy)/2;

    ctx.strokeStyle="rgba(0,255,200,0.6)";
    ctx.beginPath();
    ctx.arc(cx,cy,radius,0,Math.PI*2);
    ctx.stroke();
  }

  // PARTICLES
  particles = particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.update();
    p.draw();
  });
});

// CAMERA
const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
  },
  width: 1280,
  height: 720
});

camera.start();
</script>

</body>
</html>

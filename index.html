<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gesture Energy System ⚡</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* 🎬 Cinematic camera */
video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.7) contrast(1.3) saturate(1.2) hue-rotate(-10deg);
}

/* Overlay */
canvas {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// resize
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// Mediapipe
const hands = new Hands({
  locateFile: file =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

// STATE
let particles = [];
let angle = 0;
let globe = {
  x: window.innerWidth/2,
  y: window.innerHeight/2,
  r: 120
};
let grabbed = false;

// helpers
function dist(a,b){
  return Math.hypot(a.x-b.x, a.y-b.y);
}

// particles
function createParticles(x,y){
  for(let i=0;i<6;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*2,
      vy:(Math.random()-0.5)*2,
      life:40
    });
  }
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.fillStyle=`rgba(0,255,255,${p.life/40})`;
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fill();
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
  });
  particles = particles.filter(p=>p.life>0);
}

// MAIN
hands.onResults((results)=>{
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let handsData = [];

  if(results.multiHandLandmarks){
    results.multiHandLandmarks.forEach((lm)=>{

      const palm = {
        x: lm[9].x * canvas.width,
        y: lm[9].y * canvas.height
      };

      const thumb = {
        x: lm[4].x * canvas.width,
        y: lm[4].y * canvas.height
      };

      const index = {
        x: lm[8].x * canvas.width,
        y: lm[8].y * canvas.height
      };

      const pinch = dist(thumb,index) < 40;

      handsData.push({palm, pinch});

      // ✨ HAND AURA
      const grad = ctx.createRadialGradient(palm.x,palm.y,10,palm.x,palm.y,120);
      grad.addColorStop(0,"rgba(0,255,255,0.9)");
      grad.addColorStop(1,"transparent");

      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(palm.x,palm.y,120,0,Math.PI*2);
      ctx.fill();

      createParticles(palm.x,palm.y);
    });
  }

  drawParticles();

  // 🤏 GRAB (single hand)
  if(handsData.length === 1){
    if(handsData[0].pinch){
      grabbed = true;
      globe.x = handsData[0].palm.x;
      globe.y = handsData[0].palm.y;
    } else {
      grabbed = false;
    }
  }

  // 🙌 TWO HAND SCALE
  if(handsData.length === 2){
    const p1 = handsData[0].palm;
    const p2 = handsData[1].palm;

    globe.x = (p1.x + p2.x)/2;
    globe.y = (p1.y + p2.y)/2;
    globe.r = dist(p1,p2)/2;
  }

  // 🌍 DRAW GLOBE
  const glow = ctx.createRadialGradient(globe.x,globe.y,20,globe.x,globe.y,globe.r);
  glow.addColorStop(0,"rgba(0,255,255,0.9)");
  glow.addColorStop(1,"transparent");

  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(globe.x,globe.y,globe.r,0,Math.PI*2);
  ctx.fill();

  // 🌀 ROTATING PARTICLE SHELL
  angle += 0.03;

  for(let i=0;i<60;i++){
    const a = (i/60)*Math.PI*2 + angle;

    const x = globe.x + Math.cos(a)*globe.r;
    const y = globe.y + Math.sin(a)*globe.r;

    ctx.fillStyle="rgba(0,255,255,0.9)";
    ctx.beginPath();
    ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fill();
  }
});

// camera
const camera = new Camera(video,{
  onFrame: async()=>{
    await hands.send({image: video});
  },
  width:1280,
  height:720
});

camera.start();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gesture Intelligence Dashboard</title>

<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }

video {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  transform: scaleX(-1);
  z-index:-1;
}

/* Layout */
#top, #bottom {
  position:absolute;
  width:100%;
}

#top { height:50%; top:0; display:flex; }
#bottom { height:50%; bottom:0; }

/* Panels */
.panel {
  flex:1;
  padding:10px;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.4);
  color:white;
  overflow:auto;
}

/* News */
.news-item {
  margin-bottom:10px;
  padding:10px;
  background:rgba(255,255,255,0.1);
  border-radius:8px;
  cursor:pointer;
}

/* Map */
#map {
  width:100%;
  height:100%;
  background:url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg');
  background-size:cover;
}

/* Highlight */
.hotspot {
  position:absolute;
  width:20px;
  height:20px;
  background:red;
  border-radius:50%;
}

/* Weather */
.weather {
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  color:white;
  background:black;
  padding:20px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>

<div id="dashboard">

<div id="top">
  <div class="panel" id="news">
    <h3>Recent News</h3>
  </div>

  <div class="panel" id="live">
    <h3>Live Feed</h3>
    <iframe id="liveFrame" src="https://www.youtube.com/embed/21X5lGlDOfg" width="100%" height="80%"></iframe>
  </div>
</div>

<div id="bottom">
  <div id="map"></div>
</div>

</div>

<div id="weather" class="weather">
  <h2>Delhi Weather ☀️ 32°C</h2>
  <h2>Noida Weather 🌤️ 31°C</h2>
</div>

<script>

/* CAMERA */
navigator.mediaDevices.getUserMedia({video:true})
.then(stream => {
  document.getElementById("video").srcObject = stream;
});

/* NEWS DATA */
const newsData = [
  {title:"Reuters: Middle East tensions rise", link:"https://www.reuters.com"},
  {title:"BBC: Global reactions", link:"https://www.bbc.com"},
  {title:"Al Jazeera: Conflict analysis", link:"https://www.aljazeera.com"}
];

const newsDiv = document.getElementById("news");

newsData.forEach(n=>{
  let d = document.createElement("div");
  d.className="news-item";
  d.innerText=n.title;
  d.onclick=()=> window.open(n.link);
  newsDiv.appendChild(d);
});

/* MAP INTERACTION */
const map = document.getElementById("map");

map.onclick = (e)=>{
  map.style.backgroundSize="200%";
};

/* PINCH ZOOM (basic) */
let scale=1;

document.getElementById("liveFrame").addEventListener("wheel",(e)=>{
  scale += e.deltaY * -0.001;
  scale = Math.min(Math.max(.5, scale), 2);

  e.target.style.transform = `scale(${scale})`;
});

/* SWIPE */
let startX = 0;

document.addEventListener("touchstart",(e)=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend",(e)=>{
  let endX = e.changedTouches[0].clientX;

  if(endX - startX > 100){
    document.getElementById("dashboard").style.display="none";
    document.getElementById("weather").style.display="block";
  }
});

</script>

</body>
</html>
